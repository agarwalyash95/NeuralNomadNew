version: "3.9"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: neuralnomad_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-neuralnomad_db}
      POSTGRES_USER: ${DB_USER:-neuralnomad_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-neuralnomad_password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-neuralnomad_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - neuralnomad_network

  # Redis Cache & Message Broker
  redis:
    image: redis:7-alpine
    container_name: neuralnomad_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - neuralnomad_network

  # Mailhog for local email testing
  mailhog:
    image: mailhog/mailhog:latest
    container_name: neuralnomad_mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - neuralnomad_network

volumes:
  postgres_data:
  redis_data:

networks:
  neuralnomad_network:
    driver: bridge
